version: '3.8'

networks:
  backend-network:

services:

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders
    ports:
      - "3306:3306"
    networks:
      - backend-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - backend-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend-network

  order-service:
    build: ./order-service
    depends_on:
      - kafka
      - mysql
    ports:
      - "8081:8080"
    networks:
      - backend-network

  payment-service:
    build: ./payment-service
    depends_on:
      - kafka
      - mysql
    ports:
      - "8082:8080"
    networks:
      - backend-network

  inventory-service:
    build: ./inventory-service
    depends_on:
      - kafka
    ports:
      - "8083:8080"
    networks:
      - backend-network

  notification-service:
    build: ./notification-service
    depends_on:
      - kafka
    ports:
      - "8084:8080"
    networks:
      - backend-network